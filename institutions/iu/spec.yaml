institution: Indiana University
source_revision: September 2025
document_structure:
  front_matter:
  - id: title_page
    required: true
  - id: acceptance_page
    required: true
  - id: copyright_page
    required: false
  - id: dedication
    required: false
  - id: acknowledgements
    required: false
  - id: preface
    required: false
  - id: abstract
    required: true
  - id: toc
    required: true
  - id: list_of_tables
    required: false
  - id: list_of_figures
    required: false
  - id: list_of_abbreviations
    required: false
  body:
  - id: chapters
    required: true
  end_matter:
  - id: references
    required: true
  - id: appendices
    required: false
  - id: curriculum_vitae
    required: true
checks:
- id: global_margins
  category: layout
  checker: margins
  target:
    scope: all_pages
  params:
    top: 1in
    bottom: 1in
    left: 1.25in
    right: 1.25in
- id: margin_symmetry
  category: layout
  checker: margin_symmetry
  target:
    scope: all_pages
  params:
    threshold: 0.25in
- id: font_size_consistent
  category: typography
  checker: font_size
  target:
    scope: all_pages
  params:
    allowed:
    - 10pt
    - 11pt
    - 12pt
    consistent: true
- id: font_family_consistent
  category: typography
  checker: font_family
  target:
    scope: all_pages
  params:
    consistent: true
- id: justification_consistent
  category: typography
  checker: justification
  target:
    scope: all_pages
  params:
    consistent: true
- id: front_matter_presence
  category: structure
  checker: section_presence
  target:
    scope: front_matter
  params:
    required_sections:
    - id: title_page
    - id: acceptance_page
    - id: abstract
    - id: toc
  automatable: true
- id: front_matter_order
  category: structure
  checker: section_order
  target:
    scope: front_matter
  params:
    expected_order:
    - id: title_page
    - id: acceptance_page
    - id: abstract
    - id: toc
- id: title_clause_wording
  category: content
  checker: boilerplate_match
  target:
    page: title_page
    element: clause
  params:
    template: 'Submitted to the faculty of the {school}

      in partial fulfillment of the requirements

      for the degree

      {degree}

      in the {department},

      Indiana University {campus}

      {month} {year}

      '
    page: 1
- id: committee_chair_first
  category: content
  checker: committee_order
  target:
    page: acceptance_page
  params:
    chair_first: true
    page: 2
- id: toc_chapter_title_parity
  category: content
  checker: toc_title_parity
  target:
    scope: body
- id: title_page_no_bold
  category: typography
  checker: font_weight
  target:
    scope: title_page
  params:
    weight: normal
    page: 1
- id: title_page_no_page_number
  category: structure
  checker: title_page_no_page_number
  target:
    page: title_page
  params:
    prompt: ''
- id: title_page_all_caps
  category: typography
  checker: title_page_all_caps
  target:
    page: title_page
    element: title
- id: acceptance_page_page_number_ii
  category: structure
  checker: acceptance_page_number
  target:
    page: acceptance_page
  params:
    prompt: ''
- id: clause_spacing
  category: human
  checker: review
  target:
    page: title_page
    element: clause
  params:
    prompt: Clause line spacing matches document (single-spaced or match document spacing)

- id: title_page_clause_centered
  category: typography
  checker: title_page_clause_centered
  target:
    page: title_page
    element: clause
- id: title_page_clause_spacing
  category: typography
  checker: title_page_clause_spacing
  target:
    page: title_page
    element: clause
- id: copyright_page_format
  category: content
  checker: copyright_page_format
  target:
    page: copyright_page
- id: page_numbers_format
  category: structure
  checker: page_numbers_format
  target:
    scope: all_pages
  params:
    prompt: ''
- id: headings_consistent
  category: structure
  checker: headings_consistent
  target:
    scope: body
  params:
    prompt: ''
- id: footnotes_font_consistent
  category: typography
  checker: footnotes_font_consistent
  target:
    scope: body
- id: footnotes_spacing
  category: human
  checker: review
  target:
    scope: body
  params:
    prompt: Footnote line spacing matches document (single-spaced or match document spacing)
- id: new_chapters_new_pages
  category: structure
  checker: new_chapters_new_pages
  target:
    scope: body
  params:
    prompt: ''
- id: tables_figures_legend_font
  category: human
  checker: review
  target:
    scope: body
  params:
    prompt: Legend/descriptor font ≥10pt or matches document font size
- id: hyperlinks_format
  category: structure
  checker: hyperlinks_format
  target:
    scope: all_pages
  params:
    prompt: ''
- id: references_font_consistent
  category: typography
  checker: references_font_consistent
  target:
    scope: end_matter
- id: references_heading_format
  category: structure
  checker: references_heading_format
  target:
    scope: end_matter
- id: references_spacing
  category: human
  checker: review
  target:
    scope: end_matter
  params:
    prompt: References line spacing is single-spaced or matches document spacing
- id: cv_heading_format
  category: structure
  checker: cv_heading_format
  target:
    page: curriculum_vitae
- id: cv_name_position
  category: structure
  checker: cv_name_position
  target:
    page: curriculum_vitae
- id: cv_no_credentials
  category: human
  checker: review
  target:
    page: curriculum_vitae
  params:
    prompt: No academic credentials or PII listed on CV
- id: cv_no_page_number
  category: structure
  checker: cv_no_page_number
  target:
    page: curriculum_vitae
  params:
    prompt: ''
- id: abstract_text_centered
  category: typography
  checker: abstract_text_centered
  target:
    page: abstract
- id: abstract_word_count
  category: content
  checker: abstract_word_count
  target:
    page: abstract
- id: abstract_title_format
  category: typography
  checker: abstract_title_format
  target:
    page: abstract
- id: toc_page_numbers_aligned
  category: structure
  checker: toc_page_numbers_aligned
  target:
    page: toc
- id: toc_no_overhang
  category: structure
  checker: toc_no_overhang
  target:
    page: toc
- id: toc_cv_no_dots
  category: structure
  checker: toc_cv_no_dots
  target:
    page: toc
- id: toc_spacing
  category: human
  checker: review
  target:
    page: toc
  params:
    prompt: TOC line spacing is single-spaced or matches document
- id: final_manual_review
  category: human
  checker: review
  target:
    scope: all_pages
  params:
    prompt: 'Final manual format review: verify all formatting requirements per IU
      checklist (revised September 2025)'
constants:
  degree: Doctor of Philosophy
