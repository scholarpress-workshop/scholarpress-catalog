name: Validate Fixtures
on:
  repository_dispatch:
    types: [image-published]
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install typst
        run: |
          gh release download --repo typst/typst --pattern 'typst-x86_64-unknown-linux-musl.tar.xz'
          tar xJf typst-x86_64-unknown-linux-musl.tar.xz --strip-components=1
          sudo mv typst /usr/local/bin/
        env:
          GH_TOKEN: ${{ github.token }}
      - name: Generate fixtures
        run: bash compile.sh
        working-directory: institutions/iu/tests/fixtures
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}
      - name: Validate fixtures
        run: bash validate_fixtures.sh
        working-directory: institutions/iu/tests
